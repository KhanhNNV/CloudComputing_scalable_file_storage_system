spring.application.name=backend

server.port=8080

spring.profiles.active=${PROFILES}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false



spring.data.redis.host=${ENDPOINT_REDIS}
spring.data.redis.port=${PORT_REDIS}
spring.data.redis.password=${PASSWORD_REDIS}
spring.data.redis.ssl.enabled=true


app.jwt.secretKey=${SECRETKEY}

# AWS S3 Configuration
aws.region=ap-southeast-1
aws.s3.bucket-name=ggdrive-local-storage
aws.credentials.access-key=${AWS_ACCESS_KEY}
aws.credentials.secret-key=${AWS_SECRET_KEY}