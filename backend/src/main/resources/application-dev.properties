spring.application.name=dev

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3307/ggdrivedb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=ggdriveuser
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false


spring.data.redis.host=localhost
spring.data.redis.port=6379

app.jwt.secretKey=${SECRETKEY}

aws.region=ap-southeast-1
aws.s3.bucket-name=ggdrive-local-storage
aws.credentials.access-key=${AWS_ACCESS_KEY}
aws.credentials.secret-key=${AWS_SECRET_KEY}