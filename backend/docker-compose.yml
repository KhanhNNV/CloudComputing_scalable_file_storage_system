version: '3.8'

services:

  mysql-db:
    image: mysql:8.0
    container_name: local_mysql
    restart: always
    environment:
      MYSQL_DATABASE: ggdrivedb
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: ggdriveuser
      MYSQL_PASSWORD: 123456
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis-cache:
    image: redis:7-alpine
    container_name: local_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: .
    container_name: backend
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - mysql-db
      - redis-cache
volumes:
  mysql_data:
  redis_data: